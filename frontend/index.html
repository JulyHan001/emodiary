<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmoDiary</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📔</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ============================================
   Design Tokens
   ============================================ */
:root {
    --bg-primary:       #0A0A0B;
    --bg-surface:       #141415;
    --bg-surface-hover: #1C1C1E;
    --bg-elevated:      #232326;
    --bg-overlay:       #2A2A2E;

    --text-primary:     #EDEDEF;
    --text-secondary:   #8B8B8F;
    --text-tertiary:    #56565A;
    --text-placeholder: #44444A;

    --accent:           #5E6AD2;
    --accent-hover:     #707CE4;
    --accent-subtle:    rgba(94,106,210,0.12);
    --accent-glow:      rgba(94,106,210,0.25);

    --border:           rgba(255,255,255,0.06);
    --border-hover:     rgba(255,255,255,0.10);
    --border-focus:     rgba(94,106,210,0.5);

    --emotion-happy:    #4ADE80;
    --emotion-sad:      #60A5FA;
    --emotion-anxious:  #FACC15;
    --emotion-angry:    #F87171;
    --emotion-calm:     #A1A1AA;
    --emotion-excited:  #FB923C;
    --emotion-confused: #C084FC;

    --space-1: 4px;  --space-2: 8px;  --space-3: 12px;
    --space-4: 16px; --space-5: 20px; --space-6: 24px;
    --space-8: 32px; --space-10: 40px;

    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --text-xs: 11px; --text-sm: 13px; --text-base: 14px;
    --text-lg: 16px; --text-xl: 20px; --text-2xl: 28px;

    --radius: 6px;
    --radius-lg: 10px;
    --radius-pill: 100px;

    --ease: 150ms ease-out;
    --sidebar-w: 220px;
    --sidebar-w-collapsed: 56px;
}

/* ============================================
   Reset & Base
   ============================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
    font-family: var(--font);
    font-size: var(--text-base);
    line-height: 1.55;
    color: var(--text-primary);
    background: var(--bg-primary);
    letter-spacing: -0.006em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

::selection { background: var(--accent-subtle); color: var(--text-primary); }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 2px; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

input, select, button, textarea {
    font-family: inherit; font-size: inherit; color: inherit;
    border: none; background: none; outline: none;
}
button { cursor: pointer; }

/* ============================================
   App Layout
   ============================================ */
#app {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    height: 100%;
}

/* ============================================
   Sidebar
   ============================================ */
#sidebar {
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: var(--space-4) var(--space-3);
    gap: var(--space-1);
    overflow: hidden;
}

.sidebar-brand {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-2) var(--space-2);
    margin-bottom: var(--space-4);
}
.sidebar-logo {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent), #8B5CF6);
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: var(--text-sm); color: #fff;
    flex-shrink: 0;
}
.sidebar-brand-text {
    font-size: var(--text-base);
    font-weight: 600;
    letter-spacing: -0.02em;
    white-space: nowrap;
}

.nav-item {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: 7px 10px;
    border-radius: var(--radius);
    color: var(--text-secondary);
    font-size: var(--text-sm);
    font-weight: 500;
    transition: background var(--ease), color var(--ease);
    position: relative;
    white-space: nowrap;
}
.nav-item:hover {
    background: var(--bg-surface-hover);
    color: var(--text-primary);
}
.nav-item.active {
    background: var(--accent-subtle);
    color: var(--accent);
}
.nav-item svg {
    width: 18px; height: 18px; flex-shrink: 0;
    stroke: currentColor; fill: none;
    stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round;
}

.sidebar-spacer { flex: 1; }

.sidebar-footer {
    padding: var(--space-2);
    font-size: var(--text-xs);
    color: var(--text-tertiary);
    text-align: center;
    white-space: nowrap;
}

/* ============================================
   Main Content
   ============================================ */
#main-content {
    overflow: hidden;
    position: relative;
}

.view {
    display: none;
    flex-direction: column;
    height: 100%;
    animation: viewFadeIn 200ms ease-out;
}
.view.active { display: flex; }

@keyframes viewFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: none; }
}

.view-header {
    padding: var(--space-6) var(--space-8) var(--space-4);
    flex-shrink: 0;
}
.view-header h1 {
    font-size: var(--text-xl);
    font-weight: 600;
    letter-spacing: -0.025em;
}
.view-header p {
    color: var(--text-secondary);
    font-size: var(--text-sm);
    margin-top: var(--space-1);
}

.view-body {
    flex: 1;
    overflow-y: auto;
    padding: 0 var(--space-8) var(--space-6);
}

/* ============================================
   Buttons
   ============================================ */
.btn-accent {
    background: var(--accent);
    color: #fff;
    padding: 7px var(--space-4);
    border-radius: var(--radius);
    font-size: var(--text-sm);
    font-weight: 500;
    transition: background var(--ease), opacity var(--ease);
}
.btn-accent:hover { background: var(--accent-hover); }
.btn-accent:disabled { opacity: 0.35; cursor: not-allowed; }

.btn-ghost {
    color: var(--text-secondary);
    border: 1px solid var(--border);
    padding: 7px var(--space-4);
    border-radius: var(--radius);
    font-size: var(--text-sm);
    font-weight: 500;
    transition: background var(--ease), color var(--ease), border-color var(--ease);
}
.btn-ghost:hover {
    background: var(--bg-surface-hover);
    color: var(--text-primary);
    border-color: var(--border-hover);
}

/* ============================================
   Emotion Pills
   ============================================ */
.emotion-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: var(--text-xs);
    font-weight: 500;
    color: var(--text-secondary);
    padding: 2px 10px 2px 7px;
    border-radius: var(--radius-pill);
    background: var(--bg-elevated);
}
.emotion-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--pill-color, var(--text-tertiary));
    flex-shrink: 0;
}

/* ============================================
   Form Controls
   ============================================ */
.form-input, .form-select {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 7px var(--space-3);
    border-radius: var(--radius);
    font-size: var(--text-sm);
    transition: border-color var(--ease);
    color-scheme: dark;
}
.form-input:hover, .form-select:hover { border-color: var(--border-hover); }
.form-input:focus, .form-select:focus { border-color: var(--border-focus); }
.form-input::placeholder { color: var(--text-placeholder); }

.form-label {
    display: block;
    font-size: var(--text-xs);
    font-weight: 500;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: var(--space-1);
}

.filter-group { display: flex; flex-direction: column; }
.filters-bar {
    display: flex;
    gap: var(--space-4);
    align-items: flex-end;
    flex-wrap: wrap;
    margin-bottom: var(--space-5);
}

/* ============================================
   Empty / Loading States
   ============================================ */
.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-10);
    color: var(--text-tertiary);
    font-size: var(--text-sm);
    gap: var(--space-2);
    text-align: center;
}

.spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 650ms linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-row {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-4);
    color: var(--text-secondary);
    font-size: var(--text-sm);
}

.error-msg {
    color: #F87171;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.15);
    padding: var(--space-3) var(--space-4);
    border-radius: var(--radius);
    font-size: var(--text-sm);
}

/* ============================================
   Chat View
   ============================================ */
.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 0 var(--space-8) var(--space-4);
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
}

.chat-msg {
    max-width: 72%;
    animation: msgFadeIn 200ms ease-out;
}
@keyframes msgFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: none; }
}

.chat-msg--user {
    align-self: flex-end;
}
.chat-msg--user .msg-bubble {
    background: var(--accent);
    color: #fff;
    border-radius: var(--radius-lg) var(--radius-lg) 3px var(--radius-lg);
    padding: var(--space-3) var(--space-4);
    font-size: var(--text-sm);
    line-height: 1.55;
}

.chat-msg--assistant {
    align-self: flex-start;
}
.chat-msg--assistant .msg-bubble {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 3px var(--radius-lg) var(--radius-lg) var(--radius-lg);
    padding: var(--space-3) var(--space-4);
    font-size: var(--text-sm);
    line-height: 1.65;
}

.msg-emotion {
    margin-bottom: var(--space-2);
}

.msg-bubble p { margin-bottom: var(--space-2); }
.msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble strong { font-weight: 600; }
.msg-bubble code {
    background: rgba(255,255,255,0.06);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 0.9em;
}
.msg-bubble ul, .msg-bubble ol { padding-left: var(--space-5); margin-bottom: var(--space-2); }
.msg-bubble li { margin-bottom: 2px; }

.chat-input-area {
    flex-shrink: 0;
    padding: var(--space-4) var(--space-8);
    border-top: 1px solid var(--border);
    display: flex;
    gap: var(--space-3);
    align-items: center;
}

#chat-input {
    flex: 1;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 10px var(--space-4);
    color: var(--text-primary);
    font-size: var(--text-sm);
    transition: border-color var(--ease);
}
#chat-input:focus { border-color: var(--border-focus); }
#chat-input::placeholder { color: var(--text-placeholder); }

#chat-send {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    transition: background var(--ease), opacity var(--ease);
    flex-shrink: 0;
}
#chat-send:hover { background: var(--accent-hover); }
#chat-send:disabled { opacity: 0.3; cursor: not-allowed; }
#chat-send svg {
    width: 16px; height: 16px;
    stroke: #fff; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}

.typing-indicator {
    display: flex;
    gap: 4px;
    padding: var(--space-3) var(--space-4);
    align-self: flex-start;
}
.typing-indicator span {
    width: 6px; height: 6px;
    background: var(--text-tertiary);
    border-radius: 50%;
    animation: typingBounce 1.2s ease-in-out infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
@keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
}

.chat-welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--space-3);
    color: var(--text-tertiary);
    padding-bottom: var(--space-10);
}
.chat-welcome-icon {
    width: 48px; height: 48px;
    background: var(--accent-subtle);
    border-radius: var(--radius-lg);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
}
.chat-welcome h2 {
    font-size: var(--text-lg);
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.02em;
}
.chat-welcome p {
    font-size: var(--text-sm);
    color: var(--text-secondary);
}

/* ============================================
   Dashboard View
   ============================================ */
.kpi-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--space-4);
    margin-bottom: var(--space-5);
}
.kpi-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: var(--space-5);
    transition: border-color var(--ease);
}
.kpi-card:hover { border-color: var(--border-hover); }
.kpi-label {
    display: block;
    font-size: var(--text-xs);
    font-weight: 500;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: var(--space-2);
}
.kpi-value {
    display: block;
    font-size: var(--text-2xl);
    font-weight: 700;
    letter-spacing: -0.03em;
    font-feature-settings: 'tnum';
}
.kpi-sub {
    font-size: var(--text-xs);
    color: var(--text-tertiary);
    font-family: var(--font-mono);
    margin-top: var(--space-1);
}

.chart-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-4);
}
.chart-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: var(--space-5);
}
.chart-card h3 {
    font-size: var(--text-sm);
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: var(--space-4);
    letter-spacing: -0.01em;
}
.chart-wrap {
    position: relative;
    height: 220px;
}

/* ============================================
   History View
   ============================================ */
.entry-list {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
}

.entry-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color var(--ease);
}
.entry-card:hover { border-color: var(--border-hover); }

.entry-header {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-3) var(--space-4);
    cursor: pointer;
    transition: background var(--ease);
}
.entry-header:hover { background: var(--bg-surface-hover); }

.entry-date {
    font-size: var(--text-xs);
    color: var(--text-tertiary);
    font-family: var(--font-mono);
    font-weight: 500;
    flex-shrink: 0;
}
.entry-summary {
    flex: 1;
    font-size: var(--text-sm);
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.entry-chevron {
    width: 16px; height: 16px;
    stroke: var(--text-tertiary);
    fill: none; stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round;
    transition: transform var(--ease);
    flex-shrink: 0;
}
.entry-card.open .entry-chevron { transform: rotate(180deg); }

.entry-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 250ms ease-out;
}
.entry-card.open .entry-body {
    max-height: 400px;
}
.entry-body-inner {
    padding: 0 var(--space-4) var(--space-4);
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
    border-top: 1px solid var(--border);
    padding-top: var(--space-3);
}
.entry-detail {
    font-size: var(--text-sm);
    color: var(--text-secondary);
    line-height: 1.6;
}
.entry-detail strong {
    color: var(--text-primary);
    font-weight: 500;
    margin-right: var(--space-2);
}
.entry-keywords {
    display: flex;
    gap: var(--space-2);
    flex-wrap: wrap;
}
.keyword-tag {
    font-size: var(--text-xs);
    color: var(--text-secondary);
    background: var(--bg-elevated);
    padding: 2px 8px;
    border-radius: var(--radius-pill);
}

/* ============================================
   Report View
   ============================================ */
.report-controls {
    display: flex;
    gap: var(--space-4);
    align-items: flex-end;
    flex-wrap: wrap;
    padding: 0 var(--space-8);
    margin-bottom: var(--space-5);
}

.report-area {
    flex: 1;
    overflow-y: auto;
    padding: 0 var(--space-8) var(--space-6);
}

/* Prose styles for markdown */
.prose { color: var(--text-secondary); line-height: 1.7; }
.prose h1, .prose h2, .prose h3 {
    color: var(--text-primary);
    letter-spacing: -0.02em;
    margin-top: var(--space-6);
    margin-bottom: var(--space-3);
}
.prose h1 { font-size: var(--text-xl); font-weight: 700; }
.prose h2 { font-size: var(--text-lg); font-weight: 600; }
.prose h3 { font-size: var(--text-base); font-weight: 600; }
.prose p { margin-bottom: var(--space-3); }
.prose ul, .prose ol { padding-left: var(--space-6); margin-bottom: var(--space-3); }
.prose li { margin-bottom: var(--space-1); }
.prose strong { color: var(--text-primary); font-weight: 500; }
.prose em { font-style: italic; }
.prose code {
    background: var(--bg-elevated);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 0.88em;
}
.prose blockquote {
    border-left: 2px solid var(--accent);
    padding-left: var(--space-4);
    color: var(--text-secondary);
    margin-bottom: var(--space-3);
}
.prose hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: var(--space-6) 0;
}

/* ============================================
   Responsive
   ============================================ */
@media (max-width: 768px) {
    #app { grid-template-columns: var(--sidebar-w-collapsed) 1fr; }
    .sidebar-brand-text { display: none; }
    .nav-item span:not(.nav-icon) { display: none; }
    .nav-item { justify-content: center; padding: 10px; }
    #sidebar { padding: var(--space-3) var(--space-2); align-items: center; }
    .sidebar-brand { justify-content: center; }
    .sidebar-footer { display: none; }

    .view-header { padding: var(--space-4) var(--space-4) var(--space-3); }
    .view-body { padding: 0 var(--space-4) var(--space-4); }
    .chat-messages { padding: 0 var(--space-4) var(--space-4); }
    .chat-input-area { padding: var(--space-3) var(--space-4); }
    .chat-msg { max-width: 88%; }

    .kpi-row { grid-template-columns: 1fr; }
    .chart-row { grid-template-columns: 1fr; }

    .report-controls { padding: 0 var(--space-4); }
    .report-area { padding: 0 var(--space-4) var(--space-4); }
}

/* Stagger nav items on load */
.nav-item { opacity: 0; animation: fadeInUp 300ms ease-out forwards; }
.nav-item:nth-child(1) { animation-delay: 60ms; }
.nav-item:nth-child(2) { animation-delay: 120ms; }
.nav-item:nth-child(3) { animation-delay: 180ms; }
.nav-item:nth-child(4) { animation-delay: 240ms; }
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: none; }
}
</style>
</head>
<body>
<div id="app">
    <!-- Sidebar -->
    <nav id="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-logo">E</div>
            <span class="sidebar-brand-text">EmoDiary</span>
        </div>

        <button class="nav-item active" data-view="chat">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>聊天</span>
        </button>
        <button class="nav-item" data-view="dashboard">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
            <span>仪表盘</span>
        </button>
        <button class="nav-item" data-view="history">
            <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            <span>历史日记</span>
        </button>
        <button class="nav-item" data-view="report">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <span>成长报告</span>
        </button>

        <div class="sidebar-spacer"></div>
        <div class="sidebar-footer">EmoDiary v0.1</div>
    </nav>

    <!-- Main Content -->
    <main id="main-content">

        <!-- Chat View -->
        <div id="view-chat" class="view active">
            <div class="view-header">
                <h1>聊天</h1>
                <p>记录你的情绪，我会给你温暖的回应</p>
            </div>
            <div id="chat-messages" class="chat-messages">
                <div id="chat-welcome" class="chat-welcome">
                    <div class="chat-welcome-icon">📔</div>
                    <h2>开始你的情感日记</h2>
                    <p>告诉我你今天的心情，我会分析你的情绪并给出回应</p>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" class="form-input" placeholder="告诉我你今天的心情..." autocomplete="off" style="border-radius:var(--radius-lg)">
                <button id="chat-send" disabled>
                    <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="view-dashboard" class="view">
            <div class="view-header">
                <h1>情绪仪表盘</h1>
                <p>你的情绪趋势与分析</p>
            </div>
            <div class="view-body" id="dashboard-body">
                <div class="kpi-row">
                    <div class="kpi-card">
                        <span class="kpi-label">总记录数</span>
                        <span class="kpi-value" id="kpi-total">--</span>
                    </div>
                    <div class="kpi-card">
                        <span class="kpi-label">最常见情绪</span>
                        <span class="kpi-value" id="kpi-emotion">--</span>
                    </div>
                    <div class="kpi-card">
                        <span class="kpi-label">平均情绪分数</span>
                        <span class="kpi-value" id="kpi-avg">--</span>
                        <span class="kpi-sub" id="kpi-avg-bar"></span>
                    </div>
                </div>
                <div class="chart-row">
                    <div class="chart-card">
                        <h3>情绪分布</h3>
                        <div class="chart-wrap"><canvas id="chart-distribution"></canvas></div>
                    </div>
                    <div class="chart-card">
                        <h3>情绪分数趋势</h3>
                        <div class="chart-wrap"><canvas id="chart-trend"></canvas></div>
                    </div>
                </div>
                <div id="dashboard-empty" class="empty-state" style="display:none;">
                    <p>还没有日记记录</p>
                    <p>去聊天页面记录你的第一篇日记吧</p>
                </div>
            </div>
        </div>

        <!-- History View -->
        <div id="view-history" class="view">
            <div class="view-header">
                <h1>历史日记</h1>
                <p>浏览和筛选你的情感记录</p>
            </div>
            <div class="view-body">
                <div class="filters-bar">
                    <div class="filter-group">
                        <label class="form-label">开始日期</label>
                        <input type="date" id="filter-start" class="form-input">
                    </div>
                    <div class="filter-group">
                        <label class="form-label">结束日期</label>
                        <input type="date" id="filter-end" class="form-input">
                    </div>
                    <div class="filter-group">
                        <label class="form-label">情绪筛选</label>
                        <select id="filter-emotion" class="form-select">
                            <option value="">全部</option>
                            <option value="happy">happy</option>
                            <option value="sad">sad</option>
                            <option value="anxious">anxious</option>
                            <option value="angry">angry</option>
                            <option value="calm">calm</option>
                            <option value="excited">excited</option>
                            <option value="confused">confused</option>
                        </select>
                    </div>
                    <button class="btn-ghost" id="filter-apply">筛选</button>
                    <button class="btn-ghost" id="filter-reset">重置</button>
                </div>
                <div id="history-entries" class="entry-list"></div>
                <div id="history-empty" class="empty-state" style="display:none;">
                    <p>没有找到符合条件的日记记录</p>
                </div>
            </div>
        </div>

        <!-- Report View -->
        <div id="view-report" class="view">
            <div class="view-header">
                <h1>成长报告</h1>
                <p>生成你的情感成长分析报告</p>
            </div>
            <div class="report-controls">
                <div class="filter-group">
                    <label class="form-label">报告周期</label>
                    <select id="report-period" class="form-select">
                        <option value="week">周报</option>
                        <option value="month">月报</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="form-label">参考日期</label>
                    <input type="date" id="report-date" class="form-input">
                </div>
                <button class="btn-accent" id="report-generate">生成报告</button>
            </div>
            <div class="report-area" id="report-area">
                <div class="empty-state" id="report-empty">
                    <p>选择周期和日期，点击生成报告</p>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
/* ============================================
   Constants & State
   ============================================ */
const API = '/api';
const EMOTION_COLORS = {
    happy: '#4ADE80', sad: '#60A5FA', anxious: '#FACC15',
    angry: '#F87171', calm: '#A1A1AA', excited: '#FB923C', confused: '#C084FC'
};
const EMOTION_LABELS = {
    happy: '开心', sad: '难过', anxious: '焦虑',
    angry: '愤怒', calm: '平静', excited: '兴奋', confused: '困惑'
};

const messages = [];
let distChart = null;
let trendChart = null;
let sending = false;

/* ============================================
   Marked.js Config
   ============================================ */
marked.setOptions({ breaks: true, gfm: true });

/* ============================================
   Chart.js Global Config
   ============================================ */
Chart.defaults.color = '#8B8B8F';
Chart.defaults.borderColor = 'rgba(255,255,255,0.04)';
Chart.defaults.font.family = "'Inter', sans-serif";
Chart.defaults.font.size = 12;

/* ============================================
   Utilities
   ============================================ */
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

function getEmotionColor(emotion) {
    return EMOTION_COLORS[emotion] || '#A1A1AA';
}

function formatDate(iso) {
    if (!iso) return '';
    return iso.slice(0, 10);
}

function todayISO() {
    return new Date().toISOString().slice(0, 10);
}

/* ============================================
   Navigation
   ============================================ */
const navItems = $$('.nav-item');
const views = $$('.view');

function switchView(name) {
    navItems.forEach(n => n.classList.toggle('active', n.dataset.view === name));
    views.forEach(v => {
        const isTarget = v.id === `view-${name}`;
        v.classList.toggle('active', isTarget);
    });
    if (name === 'dashboard') loadDashboard();
    if (name === 'history') loadHistory();
}

navItems.forEach(item => {
    item.addEventListener('click', () => switchView(item.dataset.view));
});

/* ============================================
   Chat View
   ============================================ */
const chatMessages = $('#chat-messages');
const chatInput = $('#chat-input');
const chatSend = $('#chat-send');
const chatWelcome = $('#chat-welcome');

chatInput.addEventListener('input', () => {
    chatSend.disabled = !chatInput.value.trim() || sending;
});
chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !chatSend.disabled) {
        e.preventDefault();
        sendMessage();
    }
});
chatSend.addEventListener('click', sendMessage);

function appendMessage(role, content, emotion) {
    if (chatWelcome) chatWelcome.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = `chat-msg chat-msg--${role}`;

    let html = '';
    if (role === 'assistant' && emotion) {
        const color = getEmotionColor(emotion.emotion);
        const label = EMOTION_LABELS[emotion.emotion] || emotion.emotion;
        html += `<div class="msg-emotion">
            <span class="emotion-pill" style="--pill-color:${color}">
                <span class="emotion-dot"></span>
                ${escapeHtml(label)} · ${emotion.score.toFixed(2)}
            </span>
        </div>`;
    }

    if (role === 'assistant') {
        html += `<div class="msg-bubble">${marked.parse(content)}</div>`;
    } else {
        html += `<div class="msg-bubble">${escapeHtml(content)}</div>`;
    }

    msg.innerHTML = html;
    chatMessages.appendChild(msg);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    messages.push({ role, content, emotion });
}

function showTyping() {
    const el = document.createElement('div');
    el.className = 'typing-indicator';
    el.id = 'typing';
    el.innerHTML = '<span></span><span></span><span></span>';
    chatMessages.appendChild(el);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return el;
}

function removeTyping() {
    const el = $('#typing');
    if (el) el.remove();
}

async function sendMessage() {
    const text = chatInput.value.trim();
    if (!text || sending) return;

    sending = true;
    chatInput.value = '';
    chatSend.disabled = true;
    chatInput.disabled = true;

    appendMessage('user', text, null);
    showTyping();

    try {
        const resp = await fetch(`${API}/chat/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_input: text })
        });
        removeTyping();

        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            appendMessage('assistant', `错误: ${err.detail || resp.statusText}`, null);
            return;
        }

        const data = await resp.json();
        appendMessage('assistant', data.response || '', data.emotion_analysis || null);
    } catch (err) {
        removeTyping();
        appendMessage('assistant', `连接后端失败: ${err.message}`, null);
    } finally {
        sending = false;
        chatInput.disabled = false;
        chatInput.focus();
        chatSend.disabled = !chatInput.value.trim();
    }
}

/* ============================================
   Dashboard View
   ============================================ */
async function loadDashboard() {
    try {
        const resp = await fetch(`${API}/diary/?limit=100`);
        const data = await resp.json();
        const entries = data.entries || [];

        const kpiSection = $('.kpi-row');
        const chartSection = $('.chart-row');
        const emptyEl = $('#dashboard-empty');

        if (entries.length === 0) {
            kpiSection.style.display = 'none';
            chartSection.style.display = 'none';
            emptyEl.style.display = 'flex';
            return;
        }

        kpiSection.style.display = '';
        chartSection.style.display = '';
        emptyEl.style.display = 'none';

        // KPIs
        $('#kpi-total').textContent = entries.length;

        const emotionCounts = {};
        let totalScore = 0;
        entries.forEach(e => {
            emotionCounts[e.emotion] = (emotionCounts[e.emotion] || 0) + 1;
            totalScore += e.emotion_score;
        });

        const topEmotion = Object.entries(emotionCounts).sort((a, b) => b[1] - a[1])[0];
        const topLabel = EMOTION_LABELS[topEmotion[0]] || topEmotion[0];
        $('#kpi-emotion').textContent = topLabel;
        $('#kpi-emotion').style.color = getEmotionColor(topEmotion[0]);

        const avg = totalScore / entries.length;
        $('#kpi-avg').textContent = avg.toFixed(2);

        // Distribution chart
        if (distChart) distChart.destroy();
        const labels = Object.keys(emotionCounts);
        const counts = Object.values(emotionCounts);
        const colors = labels.map(l => getEmotionColor(l));

        distChart = new Chart($('#chart-distribution'), {
            type: 'doughnut',
            data: {
                labels: labels.map(l => EMOTION_LABELS[l] || l),
                datasets: [{
                    data: counts,
                    backgroundColor: colors.map(c => c + '40'),
                    borderColor: colors,
                    borderWidth: 1.5,
                    hoverOffset: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '62%',
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { padding: 16, usePointStyle: true, pointStyleWidth: 8, font: { size: 11 } }
                    }
                }
            }
        });

        // Trend chart
        if (trendChart) trendChart.destroy();
        const sorted = [...entries].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
        const trendLabels = sorted.map(e => formatDate(e.created_at));
        const trendData = sorted.map(e => e.emotion_score);

        const ctx = $('#chart-trend').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 220);
        gradient.addColorStop(0, 'rgba(94,106,210,0.25)');
        gradient.addColorStop(1, 'rgba(94,106,210,0)');

        trendChart = new Chart($('#chart-trend'), {
            type: 'line',
            data: {
                labels: trendLabels,
                datasets: [{
                    data: trendData,
                    borderColor: '#5E6AD2',
                    backgroundColor: gradient,
                    fill: true,
                    tension: 0.35,
                    pointRadius: 3,
                    pointBackgroundColor: '#5E6AD2',
                    pointBorderColor: '#0A0A0B',
                    pointBorderWidth: 2,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: {
                        min: 0, max: 1,
                        grid: { color: 'rgba(255,255,255,0.03)' },
                        ticks: { stepSize: 0.25 }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { maxTicksLimit: 8, font: { size: 11 } }
                    }
                }
            }
        });
    } catch (err) {
        $('#dashboard-body').innerHTML = `<div class="error-msg">加载数据失败: ${escapeHtml(err.message)}</div>`;
    }
}

/* ============================================
   History View
   ============================================ */
$('#filter-apply').addEventListener('click', loadHistory);
$('#filter-reset').addEventListener('click', () => {
    $('#filter-start').value = '';
    $('#filter-end').value = '';
    $('#filter-emotion').value = '';
    loadHistory();
});

async function loadHistory() {
    const params = new URLSearchParams({ limit: '50' });
    const start = $('#filter-start').value;
    const end = $('#filter-end').value;
    const emotion = $('#filter-emotion').value;
    if (start) params.set('start_date', start);
    if (end) params.set('end_date', end);
    if (emotion) params.set('emotion', emotion);

    const container = $('#history-entries');
    const emptyEl = $('#history-empty');

    try {
        const resp = await fetch(`${API}/diary/?${params}`);
        const data = await resp.json();
        const entries = data.entries || [];

        if (entries.length === 0) {
            container.innerHTML = '';
            emptyEl.style.display = 'flex';
            return;
        }

        emptyEl.style.display = 'none';
        container.innerHTML = entries.map(entry => {
            const color = getEmotionColor(entry.emotion);
            const label = EMOTION_LABELS[entry.emotion] || entry.emotion;
            const keywords = (entry.keywords || []).map(k =>
                `<span class="keyword-tag">${escapeHtml(k)}</span>`
            ).join('');

            return `
            <div class="entry-card">
                <div class="entry-header" onclick="this.parentElement.classList.toggle('open')">
                    <span class="entry-date">${formatDate(entry.created_at)}</span>
                    <span class="emotion-pill" style="--pill-color:${color}">
                        <span class="emotion-dot"></span>${escapeHtml(label)}
                    </span>
                    <span class="entry-summary">${escapeHtml(entry.summary || '')}</span>
                    <svg class="entry-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <div class="entry-body">
                    <div class="entry-body-inner">
                        <div class="entry-detail"><strong>原文</strong>${escapeHtml(entry.content)}</div>
                        <div class="entry-detail"><strong>情绪强度</strong><span style="font-family:var(--font-mono)">${entry.emotion_score.toFixed(2)}</span></div>
                        <div class="entry-keywords">${keywords}</div>
                    </div>
                </div>
            </div>`;
        }).join('');
    } catch (err) {
        container.innerHTML = `<div class="error-msg">加载日记失败: ${escapeHtml(err.message)}</div>`;
    }
}

/* ============================================
   Report View
   ============================================ */
$('#report-date').value = todayISO();
$('#report-generate').addEventListener('click', generateReport);

async function generateReport() {
    const period = $('#report-period').value;
    const date = $('#report-date').value || todayISO();
    const area = $('#report-area');
    const btn = $('#report-generate');

    btn.disabled = true;
    btn.textContent = '生成中...';
    area.innerHTML = '<div class="loading-row"><div class="spinner"></div><span>正在生成报告，请稍候...</span></div>';

    try {
        const resp = await fetch(`${API}/report/?period=${encodeURIComponent(period)}&date=${encodeURIComponent(date)}`);
        const data = await resp.json();

        if (!resp.ok) {
            area.innerHTML = `<div class="error-msg">生成失败: ${escapeHtml(data.detail || '未知错误')}</div>`;
            return;
        }

        area.innerHTML = `<div class="prose">${marked.parse(data.report || '生成失败')}</div>`;
    } catch (err) {
        area.innerHTML = `<div class="error-msg">生成报告失败: ${escapeHtml(err.message)}</div>`;
    } finally {
        btn.disabled = false;
        btn.textContent = '生成报告';
    }
}

/* ============================================
   Init
   ============================================ */
chatInput.focus();
</script>
</body>
</html>
